spring.application.name=qa-management-api

server.port=8080

# ─── Supabase PostgreSQL ───────────────────────────────────────────────────────
# Values are loaded from environment variables. Create a .env file (see .env.example).
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# ─── HikariCP Connection Pool (tuned for Supabase session mode) ───────────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=300000

# ─── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

# ─── JWT ──────────────────────────────────────────────────────────────────────
security.jwt.secret=${QAMS_JWT_SECRET:qams-dev-secret-key-do-not-use-in-production-min-32-chars!!}
security.jwt.expiration-ms=${QAMS_JWT_EXPIRATION_MS:86400000}
